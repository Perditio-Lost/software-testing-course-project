services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    command: --config /livekit.yaml
    restart: always
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50020:50000-50020/udp"
    volumes:
      - ./livekit.yaml:/livekit.yaml
    networks:
      - livekit

networks:
  livekit:
    driver: bridge
